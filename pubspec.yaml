name: sahayak_ai
description: Sahayak AI — Hyper-Local Emergency Response
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"   # ✅ bumped: 3.3 adds better async + pattern matching support

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^6.0.0

  # Firebase — kept as a matched suite to avoid version conflicts
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

  # Maps
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.6.2   # required explicitly for Flutter Web

  # Location
  geolocator: ^14.0.2

  # AI
  google_generative_ai: ^0.4.6

  # Utilities
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env                 # ✅ FIX: was declared under a duplicate `flutter:` key — merged into one block